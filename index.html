<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>csvlens — CSV Explorer</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f0f1a;color:#c0caf5;min-height:100vh}
a{color:#7aa2f7;text-decoration:none}
header{background:#1a1b2e;border-bottom:1px solid #24253a;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
header h1{font-size:20px;font-weight:700;color:#e0e0f0}
header h1 span{color:#565f89;font-weight:400}
.header-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn{display:inline-block;padding:7px 16px;border-radius:6px;font-size:13px;font-weight:600;border:none;cursor:pointer;transition:background .15s;background:#24253a;color:#c0caf5}
.btn:hover{background:#32345a}
.btn-primary{background:#7aa2f7;color:#0f0f1a}
.btn-primary:hover{background:#89b4fa}
.btn-danger{background:#f7768e;color:#0f0f1a}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-danger:hover{background:#f99;color:#0f0f1a}
.import-section{background:#1a1b2e;border-radius:10px;margin:16px 24px;padding:20px;border:1px solid #24253a}
.import-section textarea{width:100%;min-height:80px;background:#0f0f1a;border:1px solid #24253a;border-radius:6px;color:#c0caf5;padding:10px;font-family:monospace;font-size:13px;resize:vertical;margin-bottom:10px}
.import-section textarea:focus{outline:none;border-color:#7aa2f7}
.import-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.import-row label{padding:7px 16px;border-radius:6px;font-size:13px;font-weight:600;background:#24253a;color:#c0caf5;cursor:pointer;transition:background .15s}
.import-row label:hover{background:#32345a}
.import-row input[type=file]{display:none}
.status-bar{background:#1a1b2e;border-bottom:1px solid #24253a;padding:8px 24px;font-size:13px;color:#565f89;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}
.status-bar .info{display:flex;gap:16px;flex-wrap:wrap}
.toolbar{display:flex;gap:8px;padding:12px 24px;flex-wrap:wrap;align-items:center}
.toolbar input{background:#0f0f1a;border:1px solid #24253a;border-radius:6px;color:#c0caf5;padding:7px 12px;font-size:13px;min-width:200px}
.toolbar input:focus{outline:none;border-color:#7aa2f7}
.toolbar select{background:#0f0f1a;border:1px solid #24253a;border-radius:6px;color:#c0caf5;padding:7px 12px;font-size:13px}
.table-wrap{overflow-x:auto;margin:0 24px 20px;border-radius:10px;border:1px solid #24253a}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:600px}
thead{position:sticky;top:0;z-index:1}
th{background:#1a1b2e;padding:10px 12px;text-align:left;font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:#565f89;border-bottom:2px solid #24253a;cursor:pointer;user-select:none;white-space:nowrap;position:relative}
th:hover{color:#7aa2f7}
th .sort-icon{display:inline-block;margin-left:4px;opacity:.4}
th.sorted .sort-icon{opacity:1;color:#7aa2f7}
th .col-filter{display:block;margin-top:6px;width:100%}
th .col-filter input{width:100%;background:#0f0f1a;border:1px solid #24253a;border-radius:4px;color:#c0caf5;padding:4px 6px;font-size:11px;box-sizing:border-box}
th .col-filter input:focus{outline:none;border-color:#7aa2f7}
td{padding:7px 12px;border-bottom:1px solid #1a1b2e;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:hover td{background:#1a1b2e}
.numeric{text-align:right;font-variant-numeric:tabular-nums}
.panel-row{display:flex;gap:16px;margin:0 24px 20px;flex-wrap:wrap}
.stats-panel{flex:1;min-width:280px;background:#1a1b2e;border-radius:10px;border:1px solid #24253a;padding:16px}
.stats-panel h3{font-size:14px;font-weight:600;color:#bb9af7;margin-bottom:10px;border-bottom:1px solid #24253a;padding-bottom:6px}
.stats-panel .stat-row{display:flex;justify-content:space-between;padding:4px 0;font-size:13px;border-bottom:1px solid #0f0f1a}
.stats-panel .stat-row .label{color:#565f89}
.stats-panel .stat-row .val{font-weight:600}
.chart-panel{flex:1;min-width:280px;background:#1a1b2e;border-radius:10px;border:1px solid #24253a;padding:16px}
.chart-panel h3{font-size:14px;font-weight:600;color:#bb9af7;margin-bottom:10px;border-bottom:1px solid #24253a;padding-bottom:6px}
.chart-panel select{background:#0f0f1a;border:1px solid #24253a;border-radius:6px;color:#c0caf5;padding:5px 10px;font-size:13px;margin-bottom:10px;width:100%}
.chart-panel canvas{max-height:250px}
#exportBtn{margin-left:auto}
.empty-state{text-align:center;padding:60px 20px;color:#565f89}
.empty-state svg{width:80px;height:80px;margin-bottom:16px;opacity:.4}
.empty-state h2{font-size:18px;font-weight:600;color:#565f89;margin-bottom:6px}
.empty-state p{font-size:14px}
@media(max-width:600px){header{padding:12px 16px}.import-section,.toolbar,.table-wrap,.panel-row{margin-left:12px;margin-right:12px}.status-bar{padding:8px 16px}}
</style>
</head>
<body>

<header>
  <h1>csvlens <span>CSV Explorer</span></h1>
  <div class="header-actions">
    <button class="btn" onclick="showImport()">Import CSV</button>
    <button class="btn" id="exportBtn" style="display:none" onclick="exportCSV()">Export</button>
  </div>
</header>

<div class="status-bar" id="statusBar">
  <div class="info">
    <span id="rowCount">No data</span>
    <span id="colCount"></span>
    <span id="filteredCount"></span>
  </div>
  <span id="statusMsg" style="font-size:12px;color:#565f89"></span>
</div>

<div id="app">
  <div class="import-section" id="importSection">
    <textarea id="csvInput" placeholder="Paste CSV data here..."></textarea>
    <div class="import-row">
      <label>Choose file<input type="file" accept=".csv,.tsv,.txt" id="fileInput"></label>
      <button class="btn btn-primary" onclick="loadCSV()">Load</button>
      <button class="btn" onclick="loadSample()">Sample data</button>
    </div>
  </div>

  <div id="content" style="display:none">
    <div class="toolbar">
      <input type="text" id="globalSearch" placeholder="Search all columns..." oninput="applyFilters()">
      <span style="color:#565f89;font-size:13px">Rows:</span>
      <button class="btn btn-sm" id="rowNumToggle" onclick="toggleRowNumbers()" title="Toggle row numbers">#</button>
      <select id="sortCol" onchange="applyFilters()"><option value="">No sort</option></select>
      <select id="sortDir"><option value="asc">Asc</option><option value="desc">Desc</option></select>
      <span style="color:#565f89;font-size:13px;margin-left:8px">Chart:</span>
      <select id="chartCol" onchange="updateChart()"><option value="">None</option></select>
      <button class="btn btn-sm" id="shareBtn" onclick="copyShareUrl()" title="Copy share URL with data encoded" style="display:none">Share</button>
      <span style="flex:1"></span>
      <button class="btn btn-sm" onclick="exportCSV()">Export CSV</button>
      <button class="btn btn-sm" onclick="exportJSON()">Export JSON</button>
    </div>

    <div class="table-wrap" id="tableWrap">
      <table id="dataTable">
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <div class="panel-row">
      <div class="stats-panel" id="statsPanel">
        <h3>Column Statistics</h3>
        <div id="statsContent"><p style="color:#565f89;font-size:13px">Select a numeric column to see stats.</p></div>
      </div>
      <div class="chart-panel" id="chartPanel">
        <h3>Chart</h3>
        <canvas id="chartCanvas"></canvas>
      </div>
    </div>
  </div>

  <div class="empty-state" id="emptyState">
    <svg viewBox="0 0 80 80" fill="none" stroke="#565f89" stroke-width="1.5">
      <rect x="10" y="20" width="60" height="48" rx="4" stroke="currentColor" fill="none"/>
      <line x1="20" y1="32" x2="60" y2="32" stroke="currentColor"/>
      <line x1="20" y1="40" x2="50" y2="40" stroke="currentColor"/>
      <line x1="20" y1="48" x2="55" y2="48" stroke="currentColor"/>
      <line x1="20" y1="56" x2="40" y2="56" stroke="currentColor"/>
      <path d="M60 16 L60 8 L20 8 L20 16" stroke="currentColor" fill="none"/>
      <line x1="30" y1="8" x2="30" y2="16" stroke="currentColor"/>
      <line x1="50" y1="8" x2="50" y2="16" stroke="currentColor"/>
    </svg>
    <h2>No data loaded</h2>
    <p>Paste CSV above or click "Choose file" to upload.</p>
  </div>
</div>

<script>
let data = [];
let headers = [];
let filtered = [];
let chart = null;
let statsColumn = null;
let showRowNums = false;

function el(tag, cls, html) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html !== undefined) e.innerHTML = html;
  return e;
}

function showImport() {
  document.getElementById('importSection').style.display = 'block';
}

function loadSample() {
  const sample = `Name,Age,City,Salary,Department
Alice Johnson,32,New York,85000,Engineering
Bob Smith,45,San Francisco,92000,Marketing
Charlie Brown,28,Chicago,67000,Design
Diana Prince,38,Washington DC,95000,Management
Eve Davis,51,Boston,120000,Engineering
Frank Miller,29,Seattle,72000,Sales
Grace Lee,35,Portland,78000,HR
Henry Wilson,42,Austin,88000,Engineering
Ivy Chen,27,Denver,65000,Design
Jack Taylor,33,Miami,71000,Sales
Karen White,44,Atlanta,91000,Marketing
Leo Martinez,31,Los Angeles,83000,Engineering
Maria Garcia,39,San Diego,76000,HR
Nathan Brown,26,Philly,62000,Design
Olivia Smith,47,Dallas,105000,Management
Peter Jones,30,Houston,69000,Sales
Quinn Johnson,36,Detroit,74000,Engineering
Rachel Green,41,Minneapolis,87000,Marketing
Sam Wilson,34,Charlotte,79000,Engineering
Tina Turner,48,Nashville,93000,Management`;
  document.getElementById('csvInput').value = sample;
  loadCSV();
}

function parseCSV(text) {
  // Auto-detect delimiter: tabs or commas
  const firstLine = text.split('\n')[0] || '';
  const tabCount = (firstLine.match(/\t/g) || []).length;
  const commaCount = (firstLine.match(/,/g) || []).length;
  const delim = tabCount > commaCount ? '\t' : ',';
  const lines = [];
  let current = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (ch === '"') { inQuotes = !inQuotes; continue; }
    if (ch === '\n' && !inQuotes) { lines.push(current); current = ''; continue; }
    current += ch;
  }
  if (current) lines.push(current);
  return lines.filter(l => l.trim()).map(l => {
    const row = [];
    let field = '', q = false;
    for (let i = 0; i < l.length; i++) {
      const c = l[i];
      if (c === '"') { q = !q; continue; }
      if (c === delim && !q) { row.push(field.trim()); field = ''; continue; }
      field += c;
    }
    row.push(field.trim());
    return row;
  });
}

function loadCSV() {
  const text = document.getElementById('csvInput').value;
  if (!text.trim()) return;
  const rows = parseCSV(text);
  if (rows.length < 1) return;
  headers = rows[0];
  data = rows.slice(1).map(row => {
    const obj = {};
    headers.forEach((h, i) => { obj[h] = row[i] || ''; });
    return obj;
  });
  document.getElementById('importSection').style.display = 'none';
  document.getElementById('content').style.display = 'block';
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('exportBtn').style.display = 'inline-block';
  render();
}

document.getElementById('fileInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => { document.getElementById('csvInput').value = ev.target.result; loadCSV(); };
  reader.readAsText(file);
});

function tryNum(v) { const n = parseFloat(v); return isNaN(n) ? null : n; }

function render() {
  const sortCol = document.getElementById('sortCol');
  const chartCol = document.getElementById('chartCol');
  sortCol.innerHTML = '<option value="">No sort</option>';
  chartCol.innerHTML = '<option value="">None</option>';
  headers.forEach(h => {
    sortCol.innerHTML += `<option value="${h.replace(/"/g,'&quot;')}">${h}</option>`;
    chartCol.innerHTML += `<option value="${h.replace(/"/g,'&quot;')}">${h}</option>`;
  });
  document.getElementById('rowCount').textContent = `${data.length} rows`;
  document.getElementById('colCount').textContent = `${headers.length} cols`;
  applyFilters();
}

function applyFilters() {
  const search = document.getElementById('globalSearch').value.toLowerCase();
  const colFilters = {};
  headers.forEach(h => {
    const inp = document.querySelector(`.col-filter input[data-col="${h.replace(/"/g,'&quot;')}"]`);
    if (inp && inp.value) colFilters[h] = inp.value.toLowerCase();
  });

  filtered = data.filter(row => {
    for (const [col, val] of Object.entries(colFilters)) {
      if (!(row[col] || '').toLowerCase().includes(val)) return false;
    }
    if (search) {
      let found = false;
      for (const v of Object.values(row)) { if ((v||'').toLowerCase().includes(search)) { found = true; break; } }
      if (!found) return false;
    }
    return true;
  });

  const sortCol = document.getElementById('sortCol').value;
  const sortDir = document.getElementById('sortDir').value;
  if (sortCol) {
    filtered.sort((a, b) => {
      const va = a[sortCol] || '', vb = b[sortCol] || '';
      const na = tryNum(va), nb = tryNum(vb);
      if (na !== null && nb !== null) return sortDir === 'asc' ? na - nb : nb - na;
      return sortDir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
    });
  }
  document.getElementById('filteredCount').textContent = filtered.length < data.length ? `(filtered: ${filtered.length})` : '';
  renderTable();
  updateStats();
  updateChart();
}

function renderTable() {
  const thead = document.getElementById('tableHead');
  const tbody = document.getElementById('tableBody');
  thead.innerHTML = '';
  tbody.innerHTML = '';

  const tr = document.createElement('tr');
  if (showRowNums) {
    const th = document.createElement('th');
    th.style.width = '50px';
    th.style.textAlign = 'center';
    th.textContent = '#';
    tr.appendChild(th);
  }
  headers.forEach(h => {
    const th = document.createElement('th');
    th.innerHTML = `${h} <span class="sort-icon">&#9650;</span><div class="col-filter"><input type="text" placeholder="Filter..." data-col="${h.replace(/"/g,'&quot;')}" oninput="applyFilters()"></div>`;
    th.addEventListener('click', e => {
      if (e.target.closest('.col-filter')) return;
      const sel = document.getElementById('sortCol');
      if (sel.value === h) {
        const dir = document.getElementById('sortDir');
        dir.value = dir.value === 'asc' ? 'desc' : 'asc';
      } else { sel.value = h; document.getElementById('sortDir').value = 'asc'; }
      applyFilters();
    });
    tr.appendChild(th);
  });
  thead.appendChild(tr);

  filtered.forEach((row, idx) => {
    const tr2 = document.createElement('tr');
    if (showRowNums) {
      const td = document.createElement('td');
      td.style.cssText = 'text-align:center;color:#565f89;font-size:11px;font-weight:600';
      // Map back to original row index
      const origIdx = data.indexOf(row);
      td.textContent = origIdx >= 0 ? origIdx + 1 : '-';
      tr2.appendChild(td);
    }
    headers.forEach(h => {
      const td = document.createElement('td');
      const val = row[h] || '';
      td.textContent = val;
      if (tryNum(val) !== null) td.className = 'numeric';
      tr2.appendChild(td);
    });
    tbody.appendChild(tr2);
  });
}

function updateStats() {
  const container = document.getElementById('statsContent');
  if (filtered.length === 0) { container.innerHTML = '<p style="color:#565f89;font-size:13px">No data to analyze.</p>'; return; }
  const numericCols = headers.filter(h => filtered.some(r => tryNum(r[h]) !== null));
  if (numericCols.length === 0) { container.innerHTML = '<p style="color:#565f89;font-size:13px">No numeric columns found.</p>'; return; }
  const col = numericCols[0];
  const vals = filtered.map(r => tryNum(r[col])).filter(v => v !== null);
  if (vals.length === 0) return;
  const sum = vals.reduce((a, b) => a + b, 0);
  const avg = sum / vals.length;
  const sorted = [...vals].sort((a, b) => a - b);
  const min = sorted[0], max = sorted[sorted.length - 1];
  const median = sorted.length % 2 === 0 ? (sorted[sorted.length/2-1] + sorted[sorted.length/2])/2 : sorted[Math.floor(sorted.length/2)];
  const counts = {};
  vals.forEach(v => { const k = Math.floor(v / 10) * 10; counts[k] = (counts[k] || 0) + 1; });
  const mode = Object.entries(counts).sort((a, b) => b[1] - a[1])[0];
  const std = Math.sqrt(vals.reduce((s, v) => s + (v - avg) ** 2, 0) / vals.length);
  container.innerHTML = `
    <div class="stat-row"><span class="label">Column</span><span class="val">${col}</span></div>
    <div class="stat-row"><span class="label">Count</span><span class="val">${vals.length}</span></div>
    <div class="stat-row"><span class="label">Sum</span><span class="val">${sum.toLocaleString()}</span></div>
    <div class="stat-row"><span class="label">Mean</span><span class="val">${avg.toFixed(2)}</span></div>
    <div class="stat-row"><span class="label">Median</span><span class="val">${median.toFixed(2)}</span></div>
    <div class="stat-row"><span class="label">Min</span><span class="val">${min.toLocaleString()}</span></div>
    <div class="stat-row"><span class="label">Max</span><span class="val">${max.toLocaleString()}</span></div>
    <div class="stat-row"><span class="label">Std Dev</span><span class="val">${std.toFixed(2)}</span></div>
    <div class="stat-row"><span class="label">Range</span><span class="val">${(max - min).toLocaleString()}</span></div>
  `;
  statsColumn = col;
}

function updateChart() {
  const col = document.getElementById('chartCol').value;
  if (!col || filtered.length === 0) { if (chart) { chart.destroy(); chart = null; } return; }
  const vals = filtered.map(r => tryNum(r[col])).filter(v => v !== null);
  if (vals.length < 2) { if (chart) { chart.destroy(); chart = null; } return; }
  const labels = vals.slice(0, 50);
  const counts = {};
  const isFew = new Set(vals).size <= 15;
  let chartLabels, chartValues;
  if (isFew) {
    vals.forEach(v => { counts[v] = (counts[v] || 0) + 1; });
    chartLabels = Object.keys(counts).map(Number);
    chartValues = Object.values(counts);
  } else {
    const min = Math.min(...vals), max = Math.max(...vals);
    const bins = 10;
    const binSize = (max - min) / bins || 1;
    const binned = {};
    for (let i = 0; i < bins; i++) { const start = min + i * binSize; binned[`${start.toFixed(1)}-${(start+binSize).toFixed(1)}`] = 0; }
    vals.forEach(v => { const idx = Math.min(Math.floor((v - min) / binSize), bins - 1); const key = Object.keys(binned)[idx]; if (key !== undefined) binned[key]++; });
    chartLabels = Object.keys(binned);
    chartValues = Object.values(binned);
  }
  if (chart) chart.destroy();
  const ctx = document.getElementById('chartCanvas').getContext('2d');
  chart = new Chart(ctx, {
    type: isFew ? 'bar' : 'bar',
    data: {
      labels: chartLabels,
      datasets: [{ label: col, data: chartValues, backgroundColor: '#7aa2f780', borderColor: '#7aa2f7', borderWidth: 1, borderRadius: 3 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#565f89', maxRotation: 45 }, grid: { color: '#1a1b2e' } },
        y: { beginAtZero: true, ticks: { color: '#565f89', stepSize: 1 }, grid: { color: '#1a1b2e' } }
      }
    }
  });
}

function toggleRowNumbers() {
  showRowNums = !showRowNums;
  document.getElementById('rowNumToggle').style.background = showRowNums ? '#32345a' : '';
  renderTable();
}

function exportCSV() {
  const rows = filtered.length ? filtered : data;
  if (!rows.length) return;
  let csv = headers.join(',') + '\n';
  rows.forEach(row => {
    csv += headers.map(h => {
      const v = (row[h] || '').toString();
      return v.includes(',') || v.includes('"') ? `"${v.replace(/"/g, '""')}"` : v;
    }).join(',') + '\n';
  });
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'export.csv'; a.click();
  URL.revokeObjectURL(url);
}

function getShareUrl() {
  const text = document.getElementById('csvInput').value;
  if (!text.trim()) return '';
  const encoded = btoa(unescape(encodeURIComponent(text)));
  return location.origin + location.pathname + '#' + encoded;
}

function copyShareUrl() {
  const url = getShareUrl();
  if (!url) { setStatus('No data to share'); return; }
  navigator.clipboard.writeText(url).then(() => {
    setStatus('Share URL copied to clipboard');
  }).catch(() => {
    setStatus('Failed to copy URL');
  });
}

function exportCSV() {
  if (!filtered.length) { setStatus('No data to export'); return; }
  const rows = [headers.join(',')];
  filtered.forEach(row => {
    rows.push(headers.map(h => {
      const v = (row[h] || '').toString();
      return v.includes(',') || v.includes('"') ? '"' + v.replace(/"/g, '""') + '"' : v;
    }).join(','));
  });
  const blob = new Blob([rows.join('\n')], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'export.csv'; a.click();
  URL.revokeObjectURL(url);
  setStatus(`Exported ${filtered.length} rows as CSV`);
}

function exportJSON() {
  if (!filtered.length) { setStatus('No data to export'); return; }
  const arr = filtered.map(row => {
    const obj = {};
    headers.forEach(h => { obj[h] = row[h] || ''; });
    return obj;
  });
  const blob = new Blob([JSON.stringify(arr, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'export.json'; a.click();
  URL.revokeObjectURL(url);
  setStatus(`Exported ${filtered.length} rows as JSON`);
}

function loadFromHash() {
  const hash = location.hash.slice(1);
  if (!hash) return;
  try {
    const text = decodeURIComponent(escape(atob(hash)));
    document.getElementById('csvInput').value = text;
    loadCSV();
  } catch(e) {
    // Invalid hash, ignore
  }
}

function loadFromUrlParam() {
  const params = new URLSearchParams(location.search);
  const url = params.get('url');
  if (url) {
    setStatus('Loading data from URL...');
    fetch(url)
      .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
      .then(text => {
        document.getElementById('csvInput').value = text;
        loadCSV();
        setStatus('Loaded from ' + url);
      })
      .catch(e => setStatus('Failed to load URL: ' + e.message));
    return true;
  }
  const csvParam = params.get('csv');
  if (csvParam) {
    document.getElementById('csvInput').value = csvParam;
    loadCSV();
    return true;
  }
  return false;
}

function setStatus(msg) {
  const el = document.getElementById('statusMsg');
  if (el) el.textContent = msg;
  if (msg) setTimeout(() => { if (el && el.textContent === msg) el.textContent = ''; }, 3000);
}

function init() {
  if (!loadFromUrlParam()) {
    loadFromHash();
  }
  showImport();
  const shareBtn = document.getElementById('shareBtn');
  if (shareBtn) shareBtn.style.display = 'inline-block';
}
init();
</script>
</body>
</html>
